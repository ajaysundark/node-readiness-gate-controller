# This file is used to patch a node-readiness sidecar container in the Calico manifest.
# original calico manifest https://raw.githubusercontent.com/projectcalico/calico/v3.30.1/manifests/calico.yaml
spec:
  template:
    spec:
      containers:
      - name: cni-status-patcher
        image: ghcr.io/ajaysundark/readiness-condition-reporter:0.1.0
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: CHECK_ENDPOINT
          value: "http://localhost:9099/readiness"
        - name: CONDITION_TYPE
          value: "network.kubernetes.io/CNIReady"
        - name: CHECK_INTERVAL
          value: "15s"
        resources:
          limits:
            cpu: 10m
            memory: 32Mi
          requests:
            cpu: 10m
            memory: 32Mi