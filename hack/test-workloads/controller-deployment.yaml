apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-gate-controller
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: readiness-gate-controller
  template:
    metadata:
      labels:
        app: readiness-gate-controller
    spec:
      # Use tolerations to allow scheduling on control plane nodes
      # This is necessary for testing purposes, as the controller needs to run outside the worker nodes
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      serviceAccountName: readiness-gate-controller
      containers:
      - name: controller
        image: your-registry/readiness-gate-controller:latest
        imagePullPolicy: Never # local testing
        command:
        - /manager
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: readiness-gate-controller
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: readiness-gate-controller
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: readiness-gate-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: readiness-gate-controller
subjects:
- kind: ServiceAccount
  name: readiness-gate-controller
  namespace: kube-system